<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaSave Pro - Descargador Gratuito</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .insta-gradient {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }
        .loader-ring {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* AnimaciÃ³n suave para la apariciÃ³n de elementos */
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="p-6">

    <header class="w-full max-w-xl text-center mt-10 mb-8">
        <div class="inline-flex items-center justify-center p-4 rounded-3xl insta-gradient mb-6 shadow-2xl shadow-pink-500/20">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v1m-4-4l-4 4m0 0l-4-4m4 4V4" />
            </svg>
        </div>
        <h1 class="text-4xl font-extrabold tracking-tight">InstaSave <span class="text-pink-500">Pro</span></h1>
        <p class="text-slate-400 mt-3 text-lg">Descarga contenido de Instagram al instante y gratis.</p>
    </header>

    <main class="w-full max-w-xl">
        <div class="glass-card p-8 rounded-[2.5rem] shadow-2xl mb-8">
            <div class="space-y-4">
                <label class="block text-sm font-medium text-slate-300 ml-1">Enlace del Reel o Video</label>
                <div class="relative">
                    <input 
                        type="text" 
                        id="urlInput"
                        placeholder="https://www.instagram.com/reels/..." 
                        class="w-full bg-slate-900/50 border border-slate-700 px-5 py-4 rounded-2xl focus:ring-2 focus:ring-pink-500 focus:outline-none transition-all text-white placeholder:text-slate-600"
                    >
                    <button 
                        onclick="pasteClipboard()"
                        class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white transition-colors"
                        title="Pegar"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                        </svg>
                    </button>
                </div>

                <button 
                    onclick="fetchContent()" 
                    id="mainBtn"
                    class="w-full h-16 insta-gradient text-white font-bold text-lg rounded-2xl shadow-lg shadow-pink-600/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-3"
                >
                    <span id="btnText">Analizar Enlace</span>
                    <div id="loader" class="loader-ring hidden"></div>
                </button>
            </div>
        </div>

        <div id="resultArea" class="hidden space-y-6 fade-in">
            <div class="glass-card p-6 rounded-[2.5rem]">
                <div class="flex items-start gap-5">
                    <div class="w-32 h-44 rounded-2xl overflow-hidden bg-slate-800 flex-shrink-0 relative border border-slate-700">
                        <img id="thumbImg" src="" alt="Thumbnail" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/40 flex items-center justify-center">
                            <svg class="w-8 h-8 text-white/70" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"/></svg>
                        </div>
                    </div>
                    <div class="flex-1 pt-2">
                        <h3 class="text-xl font-bold mb-2 line-clamp-2" id="resTitle">Contenido encontrado</h3>
                        <p class="text-slate-400 text-sm mb-6">El archivo estÃ¡ listo para ser descargado en alta calidad.</p>
                        
                        <div class="grid grid-cols-1 gap-3">
                            <button id="dlVideo" class="bg-white text-slate-900 py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-slate-200 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l-3 3m0 0l-3-3m3 3V4m0 13v4m0 0h-4m4 0h4"/></svg>
                                Descargar Video (MP4)
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full bg-slate-800 border border-slate-700 shadow-2xl text-sm font-medium hidden transition-all"></div>
    </main>

    <footer class="mt-auto py-8 text-slate-500 text-xs text-center">
        <p>Â© 2024 InstaSave Pro - Herramienta de EducaciÃ³n TecnolÃ³gica</p>
        <p class="mt-1">Recuerda respetar los derechos de autor del contenido original.</p>
    </footer>

    <script>
        const urlInput = document.getElementById('urlInput');
        const mainBtn = document.getElementById('mainBtn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');
        const resultArea = document.getElementById('resultArea');
        const toast = document.getElementById('toast');

        // FunciÃ³n para mostrar mensajes personalizados
        function notify(msg, type = 'info') {
            toast.innerText = msg;
            toast.classList.remove('hidden');
            toast.style.borderColor = type === 'error' ? '#ef4444' : '#334155';
            setTimeout(() => toast.classList.add('hidden'), 4000);
        }

        async function pasteClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                urlInput.value = text;
                notify("Enlace pegado");
            } catch (e) {
                notify("No se pudo acceder al portapapeles", "error");
            }
        }

        async function fetchContent() {
            const url = urlInput.value.trim();
            if (!url || !url.includes('instagram.com')) {
                notify("Por favor, ingresa un enlace de Instagram vÃ¡lido", "error");
                return;
            }

            // UI State Loading
            mainBtn.disabled = true;
            loader.classList.remove('hidden');
            btnText.innerText = "Procesando...";
            resultArea.classList.add('hidden');

            try {
                /* 
                   NOTA: AquÃ­ usamos un servicio de API pÃºblico (ejemplo didÃ¡ctico).
                   En un entorno real, puedes usar servicios como RapidAPI (con su plan gratuito).
                */
                const apiUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                
                // Simulamos una demora para que el usuario vea el proceso
                await new Promise(r => setTimeout(r, 1500));

                // Para este ejemplo, simulamos que obtenemos el link directo.
                // En un caso real, el JSON de la API te darÃ­a el video_url.
                const mockResult = {
                    title: "Instagram Content",
                    thumbnail: "https://placehold.co/300x500/1e293b/white?text=Instagram+Content",
                    download_url: url // En real, aquÃ­ va la URL del archivo .mp4
                };

                displayResult(mockResult);
                notify("Â¡Contenido listo!", "success");

            } catch (error) {
                notify("Error al conectar con el servidor", "error");
            } finally {
                mainBtn.disabled = false;
                loader.classList.add('hidden');
                btnText.innerText = "Analizar Enlace";
            }
        }

        function displayResult(data) {
            document.getElementById('thumbImg').src = data.thumbnail;
            document.getElementById('resTitle').innerText = data.title;
            
            // BotÃ³n de descarga real
            const dlBtn = document.getElementById('dlVideo');
            dlBtn.onclick = () => {
                notify("Iniciando descarga en segundo plano...");
                // En una app real, aquÃ­ abrirÃ­amos el link del MP4
                window.open("https://www.w3schools.com/html/mov_bbb.mp4", "_blank");
            };

            resultArea.classList.remove('hidden');
            resultArea.scrollIntoView({ behavior: 'smooth' });
        }

        // Detectar tecla Enter
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchContent();
        });
    </script>
</body>
</html>
