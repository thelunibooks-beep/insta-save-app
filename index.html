<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaSave Pro - RLTR Edition</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#dc2743">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="InstaSave">
    
    <!-- Icono de pestaÃ±a con truco de cache (?v=2) -->
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/6024/6024055.png?v=2">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/6024/6024055.png?v=2">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .insta-gradient {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #dc2743;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md">
        <!-- Cabecera -->
        <div class="text-center mb-8">
            <div class="inline-block p-3 rounded-2xl insta-gradient mb-4 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">InstaSave Pro</h1>
            <p class="text-gray-600 mt-2 text-sm font-medium">Creado por RLTR con ayuda de la IA [=_=]</p>
        </div>

        <!-- Tarjeta de Entrada -->
        <div class="glass p-6 rounded-3xl shadow-xl mb-6 border-white/50">
            <div class="relative">
                <input type="text" id="urlInput" placeholder="Pega el enlace aqui..." class="w-full px-4 py-4 rounded-xl border-2 border-gray-100 focus:border-pink-500 focus:outline-none transition-all pr-12 text-gray-700 shadow-sm">
                <button onclick="handlePaste()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-pink-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                </button>
            </div>

            <button onclick="fetchWithRapidAPI()" id="btnFetch" class="w-full mt-4 insta-gradient text-white font-semibold py-4 rounded-xl shadow-md hover:opacity-90 transition-all flex items-center justify-center gap-2 active:scale-95">
                <span id="btnText">Descargar Ahora</span>
                <div id="loader" class="loader hidden"></div>
            </button>
        </div>

        <!-- Tarjeta de Resultado -->
        <div id="resultCard" class="hidden glass p-8 rounded-3xl shadow-xl fade-in border-white/50">
            <div class="flex flex-col items-center justify-center mb-6">
                <div class="bg-green-100 p-4 rounded-full mb-3 shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <p class="text-gray-800 font-bold text-lg">Enlace preparado</p>
            </div>
            
            <a id="downloadLink" href="" target="_blank" rel="noopener noreferrer" class="block w-full bg-gray-900 text-white text-center py-4 rounded-xl font-bold hover:bg-black transition-all shadow-lg active:scale-95">
                Abrir / Descargar Contenido
            </a>
            
            <div class="mt-6 p-3 bg-gray-50/50 rounded-xl">
                <p class="text-[11px] text-center text-gray-500 italic leading-relaxed">
                    Si el video se abre en el navegador, usa el menu de tres puntos abajo a la derecha para guardarlo.
                </p>
            </div>
        </div>

        <!-- Mensajes de Estado -->
        <div id="statusMsg" class="mt-4 text-center text-sm font-bold hidden p-4 rounded-xl transition-all duration-300"></div>
    </div>

    <!-- Script PWA -->
    <script>
        // Forzamos actualizaciÃ³n de iconos con un parÃ¡metro v=2
        const iconURL = "https://cdn-icons-png.flaticon.com/512/6024/6024055.png?v=2";

        const manifest = {
            "name": "InstaSave Pro RLTR",
            "short_name": "InstaSave",
            "start_url": "./",
            "display": "standalone",
            "orientation": "portrait",
            "background_color": "#fdfcfb",
            "theme_color": "#dc2743",
            "icons": [
                {
                    "src": iconURL,
                    "sizes": "192x192",
                    "type": "image/png",
                    "purpose": "any"
                },
                {
                    "src": iconURL,
                    "sizes": "512x512",
                    "type": "image/png",
                    "purpose": "maskable"
                }
            ]
        };
        const stringManifest = JSON.stringify(manifest);
        const blob = new Blob([stringManifest], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blob);
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = manifestURL;
        document.head.appendChild(link);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    self.addEventListener('install', (e) => self.skipWaiting());
                    self.addEventListener('activate', (e) => self.clients.claim());
                    self.addEventListener('fetch', (e) => e.respondWith(fetch(e.request)));
                `;
                const swBlob = new Blob([swCode], {type: 'application/javascript'});
                const swURL = URL.createObjectURL(swBlob);
                navigator.serviceWorker.register(swURL);
            });
        }
    </script>

    <script>
        function cleanInstagramUrl(url) {
            try {
                const urlObj = new URL(url);
                return urlObj.origin + urlObj.pathname;
            } catch (e) {
                return url;
            }
        }

        async function fetchWithRapidAPI() {
            const urlInput = document.getElementById('urlInput');
            let rawUrl = urlInput.value.trim();
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const resultCard = document.getElementById('resultCard');
            const statusMsg = document.getElementById('statusMsg');
            
            const RAPID_API_KEY = "65d0cd331cmsha22430843101f76p1fbb20jsnb3e1cb4f6a62"; 

            if (!rawUrl.includes('instagram.com')) {
                showStatus("Error: Enlace de Instagram no valido.", "text-red-700 bg-red-100/80 border border-red-200");
                return;
            }

            const cleanUrl = cleanInstagramUrl(rawUrl);

            loader.classList.remove('hidden');
            btnText.innerText = "Buscando...";
            resultCard.classList.add('hidden');
            statusMsg.classList.add('hidden');

            const options = {
                method: 'GET',
                headers: {
                    'X-RapidAPI-Key': RAPID_API_KEY,
                    'X-RapidAPI-Host': 'instagram-downloader-download-instagram-stories-videos4.p.rapidapi.com'
                }
            };

            try {
                const response = await fetch(`https://instagram-downloader-download-instagram-stories-videos4.p.rapidapi.com/convert?url=${encodeURIComponent(cleanUrl)}`, options);
                
                if (response.status === 403) {
                    throw new Error("Suscripcion no activa. Revisa RapidAPI.");
                }

                const result = await response.json();
                let videoUrl = null;

                if (result.media && Array.isArray(result.media) && result.media.length > 0) {
                    const videoItem = result.media.find(m => m.type === 'video');
                    const selectedItem = videoItem || result.media[0];
                    videoUrl = selectedItem.url;
                }

                if (videoUrl) {
                    document.getElementById('downloadLink').href = videoUrl;
                    resultCard.classList.remove('hidden');
                    showStatus("Â¡Contenido encontrado!", "text-green-800 bg-green-100/80 border border-green-200");
                } else {
                    throw new Error("No se pudo obtener el enlace directo.");
                }
            } catch (error) {
                showStatus("Error: " + error.message, "text-red-700 bg-red-100/80 border border-red-200");
            } finally {
                loader.classList.add('hidden');
                btnText.innerText = "Descargar Ahora";
            }
        }

        function showStatus(msg, classes) {
            const statusMsg = document.getElementById('statusMsg');
            statusMsg.innerText = msg;
            statusMsg.className = `mt-4 text-center text-sm font-bold fade-in ${classes}`;
            statusMsg.classList.remove('hidden');
        }

        async function handlePaste() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('urlInput').value = text;
            } catch (e) {
                console.log("Portapapeles no accesible.");
            }
        }
    </script>
</body>
</html>
