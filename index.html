<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaSave Pro - Descargador Real</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .insta-gradient {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #dc2743;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-block p-3 rounded-2xl insta-gradient mb-4 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">InstaSave Pro</h1>
            <p class="text-gray-600 mt-2">Descarga contenido real de Instagram</p>
        </div>

        <div class="glass p-6 rounded-3xl shadow-xl mb-6">
            <div class="relative">
                <input type="text" id="urlInput" placeholder="Pega el enlace del Reel o Video..." class="w-full px-4 py-4 rounded-xl border-2 border-gray-100 focus:border-pink-500 focus:outline-none transition-all pr-12 text-gray-700 shadow-sm">
                <button onclick="handlePaste()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-pink-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                </button>
            </div>

            <button onclick="fetchInstagramContent()" id="btnFetch" class="w-full mt-4 insta-gradient text-white font-semibold py-4 rounded-xl shadow-md hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                <span id="btnText">Analizar Enlace</span>
                <div id="loader" class="loader hidden"></div>
            </button>
        </div>

        <div id="resultCard" class="hidden glass p-6 rounded-3xl shadow-xl animate-fade-in">
            <div id="previewContainer" class="relative rounded-2xl overflow-hidden aspect-video bg-gray-200 mb-4 shadow-inner">
                <!-- AquÃ­ se cargarÃ¡ la imagen real del video -->
                <img id="previewImage" src="" alt="Preview" class="w-full h-full object-cover">
            </div>

            <div class="space-y-3">
                <h3 class="font-bold text-gray-800 text-lg">Contenido Encontrado</h3>
                <div class="grid grid-cols-1 gap-3 mt-4">
                    <a id="downloadBtn" href="#" target="_blank" download="instagram_video.mp4" class="bg-gray-800 text-white py-4 rounded-xl font-medium hover:bg-black transition-colors flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                        </svg>
                        Descargar Archivo Real
                    </a>
                </div>
            </div>
        </div>

        <div id="statusMsg" class="mt-4 text-center text-sm font-medium hidden"></div>
    </div>

    <script>
        // Esta es una soluciÃ³n usando un proxy gratuito para evitar bloqueos
        async function fetchInstagramContent() {
            const url = document.getElementById('urlInput').value.trim();
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const resultCard = document.getElementById('resultCard');
            const statusMsg = document.getElementById('statusMsg');

            if (!url.includes('instagram.com')) {
                alert("Pega un enlace de Instagram vÃ¡lido");
                return;
            }

            // UI Loading
            loader.classList.remove('hidden');
            btnText.innerText = "Buscando...";
            resultCard.classList.add('hidden');

            try {
                // Intentamos usar un servicio de terceros que permite descarga directa (ejemplo educativo)
                // Nota: Los descargadores gratuitos suelen cambiar sus APIs. 
                // Esta URL intenta obtener el enlace directo procesÃ¡ndolo.
                const apiUrl = `https://api.sssgram.com/st-tik/ins/dl?url=${encodeURIComponent(url)}`;
                
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data && data.result && data.result.insVideoUrl) {
                    const videoUrl = data.result.insVideoUrl;
                    const thumbUrl = data.result.thumbnail;

                    document.getElementById('previewImage').src = thumbUrl;
                    document.getElementById('downloadBtn').href = videoUrl;
                    
                    resultCard.classList.remove('hidden');
                    showStatus("Â¡Video encontrado!", "text-green-600");
                } else {
                    throw new Error("No se pudo extraer el video");
                }
            } catch (error) {
                console.error(error);
                showStatus("Error al obtener el video. Intenta con otro enlace o mÃ¡s tarde.", "text-red-500");
                alert("Instagram ha bloqueado la peticiÃ³n. Para que funcione 100% siempre, necesitarÃ­as una API Key de RapidAPI.");
            } finally {
                loader.classList.add('hidden');
                btnText.innerText = "Analizar Enlace";
            }
        }

        function showStatus(msg, color) {
            const statusMsg = document.getElementById('statusMsg');
            statusMsg.innerText = msg;
            statusMsg.className = `mt-4 text-center text-sm font-medium ${color}`;
            statusMsg.classList.remove('hidden');
        }

        async function handlePaste() {
            const text = await navigator.clipboard.readText();
            document.getElementById('urlInput').value = text;
        }
    </script>
</body>
</html>
