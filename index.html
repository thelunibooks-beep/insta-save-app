<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaSave Pro - Ultra Estable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .insta-gradient {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #dc2743;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-block p-3 rounded-2xl insta-gradient mb-4 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">InstaSave Pro</h1>
            <p class="text-gray-600 mt-2 text-sm">VersiÃ³n Core Optimizada</p>
        </div>

        <div class="glass p-6 rounded-3xl shadow-xl mb-6">
            <div class="relative">
                <input type="text" id="urlInput" placeholder="Pega el enlace del Reel..." class="w-full px-4 py-4 rounded-xl border-2 border-gray-100 focus:border-pink-500 focus:outline-none transition-all pr-12 text-gray-700 shadow-sm">
                <button onclick="handlePaste()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-pink-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                </button>
            </div>

            <button onclick="fetchWithRapidAPI()" id="btnFetch" class="w-full mt-4 insta-gradient text-white font-semibold py-4 rounded-xl shadow-md hover:opacity-90 transition-all flex items-center justify-center gap-2">
                <span id="btnText">Descargar Ahora</span>
                <div id="loader" class="loader hidden"></div>
            </button>
        </div>

        <div id="resultCard" class="hidden glass p-6 rounded-3xl shadow-xl">
            <div class="aspect-video bg-gray-100 rounded-2xl mb-4 overflow-hidden border border-gray-100 relative">
                <img id="previewImage" src="" alt="Miniatura" class="w-full h-full object-cover">
            </div>
            <a id="downloadLink" href="" target="_blank" download="instagram_video.mp4" rel="noopener noreferrer" class="block w-full bg-gray-900 text-white text-center py-4 rounded-xl font-bold hover:bg-black transition-all">
                Abrir / Descargar Video
            </a>
            <p class="text-xs text-center text-gray-400 mt-4 italic">Si el video se abre en el navegador, usa los tres puntos del reproductor para "Descargar".</p>
        </div>

        <div id="statusMsg" class="mt-4 text-center text-sm font-medium hidden p-3 rounded-xl"></div>
    </div>

    <script>
        // FunciÃ³n para limpiar la URL de Instagram
        function cleanInstagramUrl(url) {
            try {
                const urlObj = new URL(url);
                return urlObj.origin + urlObj.pathname;
            } catch (e) {
                return url;
            }
        }

        async function fetchWithRapidAPI() {
            const urlInput = document.getElementById('urlInput');
            let rawUrl = urlInput.value.trim();
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const resultCard = document.getElementById('resultCard');
            const statusMsg = document.getElementById('statusMsg');
            
            const RAPID_API_KEY = "65d0cd331cmsha22430843101f76p1fbb20jsnb3e1cb4f6a62"; 

            if (!rawUrl.includes('instagram.com')) {
                showStatus("Error: Pega un enlace de Instagram vÃ¡lido.", "text-red-600 bg-red-50");
                return;
            }

            const cleanUrl = cleanInstagramUrl(rawUrl);

            loader.classList.remove('hidden');
            btnText.innerText = "Procesando...";
            resultCard.classList.add('hidden');
            statusMsg.classList.add('hidden');

            const options = {
                method: 'GET',
                headers: {
                    'X-RapidAPI-Key': RAPID_API_KEY,
                    'X-RapidAPI-Host': 'instagram-downloader-download-instagram-stories-videos4.p.rapidapi.com'
                }
            };

            try {
                const response = await fetch(`https://instagram-downloader-download-instagram-stories-videos4.p.rapidapi.com/convert?url=${encodeURIComponent(cleanUrl)}`, options);
                
                if (response.status === 403) {
                    throw new Error("SuscripciÃ³n no activa. Pulsa 'Subscribe to Test' en RapidAPI.");
                }

                const result = await response.json();
                console.log("Respuesta Completa de API:", result);

                // LÃ“GICA DE BÃšSQUEDA PROFUNDA DE VIDEO
                let videoUrl = null;
                let thumbUrl = null;

                // 1. Verificar si la respuesta es un array de objetos (algunas APIs lo devuelven asÃ­)
                if (Array.isArray(result)) {
                    videoUrl = result[0].url || result[0].media;
                    thumbUrl = result[0].thumb || result[0].thumbnail;
                } 
                // 2. Verificar estructura de objeto con campo .url o .media
                else {
                    videoUrl = result.url || result.media || (result.data && result.data.video_url);
                    thumbUrl = result.thumb || result.thumbnail || (result.data && result.data.thumbnail);
                }

                // 3. Si no es un string directo, buscar dentro de arrays internos
                if (typeof videoUrl !== 'string' && videoUrl !== null) {
                    if (Array.isArray(videoUrl)) videoUrl = videoUrl[0].url || videoUrl[0];
                    else if (videoUrl.url) videoUrl = videoUrl.url;
                }

                if (videoUrl && typeof videoUrl === 'string') {
                    document.getElementById('previewImage').src = thumbUrl || "";
                    document.getElementById('downloadLink').href = videoUrl;
                    
                    resultCard.classList.remove('hidden');
                    showStatus("Â¡Video procesado con Ã©xito!", "text-green-600 bg-green-50 border border-green-200");
                } else {
                    throw new Error("No se encontrÃ³ un enlace de vÃ­deo. El Reel podrÃ­a ser privado o incompatible.");
                }
            } catch (error) {
                showStatus("Error: " + error.message, "text-red-600 bg-red-50 border border-red-200");
            } finally {
                loader.classList.add('hidden');
                btnText.innerText = "Descargar Ahora";
            }
        }

        function showStatus(msg, classes) {
            const statusMsg = document.getElementById('statusMsg');
            statusMsg.innerText = msg;
            statusMsg.className = `mt-4 text-center text-sm font-medium ${classes}`;
            statusMsg.classList.remove('hidden');
        }

        async function handlePaste() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('urlInput').value = text;
            } catch (e) {
                console.log("Error al acceder al portapapeles.");
            }
        }
    </script>
</body>
</html>
